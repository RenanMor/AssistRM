<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistente de Orcamentos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="auth-overlay" class="auth-overlay hidden">
    <div class="auth-card">
      <h2>Acesso Restrito</h2>
      <p>Digite a senha para continuar</p>
      <input type="password" id="auth-password" placeholder="Senha" />
      <button id="auth-submit">Entrar</button>
      <p id="auth-error" class="error-msg hidden">Senha incorreta</p>
    </div>
  </div>

  <div id="app">
    <section id="chat-pane">
      <header id="chat-header">
        <div class="brand">
          <div class="logo">AO</div>
          <div>
            <h1>Assistente de Orcamentos</h1>
            <p class="subtitle">Consulta de documentos via Google Drive + IA</p>
          </div>
        </div>
        <div id="client-badge" class="client-badge hidden">
          <span class="dot"></span>
          <span class="label">Cliente:</span>
          <span id="client-name"></span>
          <button id="clear-client" title="Limpar cliente selecionado">&times;</button>
        </div>
      </header>

      <div id="messages"></div>

      <form id="chat-form">
        <input
          id="chat-input"
          type="text"
          autocomplete="off"
          placeholder="Ex.: quero saber o valor orcado para Vanessa de Araujo"
        />
        <button type="submit" id="send-btn">Enviar</button>
      </form>
    </section>

    <div id="divider"></div>

    <section id="viewer-pane">
      <div id="viewer-empty" class="viewer-empty">
        <div class="viewer-empty-icon">PDF</div>
        <p>O documento do cliente aparecera aqui assim que for localizado.</p>
      </div>
      <div id="viewer-content" class="hidden">
        <div id="viewer-toolbar">
          <span id="viewer-filename"></span>
          <a id="viewer-open" href="#" target="_blank" rel="noopener">Abrir em nova aba</a>
        </div>
        <iframe id="pdf-frame" title="Visualizador de PDF"></iframe>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
